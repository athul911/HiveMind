apiVersion: v1
kind: Service
metadata:
  name: {{ include "hivemind.fullname" . }}
  labels:
    {{- include "hivemind.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.api.containerPort }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "hivemind.name" . }}
    app.kubernetes.io/component: api
